name: Build dexhero-gpu-bench

on:
  push:
    tags: ['v*']
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

# softprops/action-gh-release@v1 needs contents:write to attach binaries
# on a tag-push trigger. Default GITHUB_TOKEN is contents:read.
permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-vulkan-loader
            mingw-w64-ucrt-x86_64-glslang
            mingw-w64-ucrt-x86_64-libsecp256k1
            mingw-w64-ucrt-x86_64-openssl

      - name: Configure
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Stage artifacts
        shell: msys2 {0}
        run: |
          mkdir -p dist/windows
          cp build/dexhero-gpu-bench.exe dist/windows/
          cp build/*.spv dist/windows/

      - uses: actions/upload-artifact@v4
        with:
          name: dexhero-gpu-bench-windows
          path: dist/windows

  linux:
    # Closed-beta = Windows-only host fleet. Linux build kept on
    # workflow_dispatch only so a v0.1.x tag doesn't burn ~5 min on a
    # platform we don't ship to yet.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Vulkan + glslang + secp256k1 + openssl
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libvulkan-dev glslang-tools libsecp256k1-dev libssl-dev pkg-config
      - name: Configure + Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
      - uses: actions/upload-artifact@v4
        with:
          name: dexhero-gpu-bench-linux
          path: build/dexhero-gpu-bench

  macos:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install Vulkan SDK + glslang + secp256k1 + openssl via brew
        run: brew install cmake ninja vulkan-headers vulkan-loader molten-vk glslang secp256k1 openssl pkg-config
      - name: Configure + Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
      - uses: actions/upload-artifact@v4
        with:
          name: dexhero-gpu-bench-macos
          path: build/dexhero-gpu-bench

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          for plat in windows linux macos; do
            if [[ -d "artifacts/dexhero-gpu-bench-$plat" ]]; then
              cp -r "artifacts/dexhero-gpu-bench-$plat" release/
            fi
          done
      - uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
